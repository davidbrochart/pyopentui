name: Publish

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+.post[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+[a-b][0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+rc[0-9]+"

jobs:
  build:
    runs-on: ${{ matrix.os }}-latest
    strategy:
      matrix:
        os: [ubuntu, macos, windows]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Download opentui source code
        run: |
          curl -L -o opentui.zip https://github.com/anomalyco/opentui/archive/refs/tags/v0.1.92.zip
          unzip opentui.zip
      - name: Compile opentui Zig core
        run: |
          cd opentui-0.1.92/packages/core/src/zig
          zig build -Doptimize=ReleaseSafe
          cd -
          mkdir src/pyopentui/lib
          cp opentui-0.1.92/packages/core/src/zig/lib/*/* src/pyopentui/lib
      - name: Build the package
        run: |
          python -m build --wheel
          python -m build --sdist
          python rename_wheel.py
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  pypi-publish:
    name: Upload release to PyPI
    needs: build
    runs-on: ${{ matrix.os }}-latest
    environment: release
    permissions:
      id-token: write
    steps:
    - name: Retrieve packages
      uses: actions/download-artifact@v5
      with:
        name: dist
        path: dist
    - name: Display structure of downloaded files
      run: ls -R
    - name: Upload packages
      uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
      name: Create GitHub release
      needs: pypi-publish
      runs-on: ubuntu-latest
      permissions:
        contents: write
      steps:
      - uses: actions/checkout@v5
      - id: changelog
        uses: agronholm/release-notes@v1
        with:
          path: CHANGELOG.md
          version_pattern: ^\#\# ([0-9][^*]*)\n
      - uses: ncipollo/release-action@v1
        with:
          body: ${{ steps.changelog.outputs.changelog }}
